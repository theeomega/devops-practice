name: DEVOPS-PRACTICE

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t test .

      - name: Docker run
        run: docker run -d -p 5000:5000 test
